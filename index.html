<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Girls Trip Countdown</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background"></div>

  <main class="card">
    <h1>Girls Trip Countdown</h1>
    <p class="subtitle">Boston · July 12, 2026</p>

    <div id="countdown" class="countdown">
      <div class="time-box">
        <span id="days" class="number">0</span>
        <span class="label">days</span>
      </div>
      <div class="time-box">
        <span id="hours" class="number">0</span>
        <span class="label">hours</span>
      </div>
      <div class="time-box">
        <span id="minutes" class="number">0</span>
        <span class="label">minutes</span>
      </div>
      <div class="time-box">
        <span id="seconds" class="number">0</span>
        <span class="label">seconds</span>
      </div>
    </div>

    <p id="message" class="message hidden">
      It’s trip time! ✈🍹
    </p>
  </main>

  <script src="script.js"></script>
</body>
</html>
