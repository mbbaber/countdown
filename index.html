<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Girls Trip Countdown</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="background"></div>

  <div class="centered-content">
    <h1 class="fancy-title centered">BOSTON COUNTDOWN</h1>
    <div id="countdown" class="countdown clock-fancy">
      <div class="time-segment">
        <span id="days" class="number">00</span>
        <span class="label">Days</span>
      </div>
      <div class="colon">:</div>
      <div class="time-segment">
        <span id="hours" class="number">00</span>
        <span class="label">Hours</span>
      </div>
      <div class="colon">:</div>
      <div class="time-segment">
        <span id="minutes" class="number">00</span>
        <span class="label">Minutes</span>
      </div>
      <div class="colon">:</div>
      <div class="time-segment">
        <span id="seconds" class="number">00</span>
        <span class="label">Seconds</span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
